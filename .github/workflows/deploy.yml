name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd brief-site
          npm ci

      - name: Build
        run: |
          cd brief-site
          npm run build

      - name: Deploy to gh-pages
        run: |
          cd brief-site
          # Initialize a new orphan branch gh-pages in a fresh temporary repo
          cd dist
          git init
          git checkout -b gh-pages
          git add -A
          git config user.email "91305696+Yutao-Zhou@users.noreply.github.com"
          git config user.name "Yutao Zhou"
          git commit -m "feat: deploy financial-insights site $(date -u '+%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Yutao-Zhou/financial-insights.git
          git push -f origin gh-pages
