<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Financial Insights - Daily Brief</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; margin: 0; background: #f9f9f9; color: #111; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .last-updated { color: #666; font-size: 0.875rem; margin-bottom: 24px; }
    .brief { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .date { font-weight: 600; color: #0066cc; margin-bottom: 8px; }
    .summary { margin-bottom: 12px; }
    .section-title { font-weight: 600; margin: 12px 0 4px; color: #333; }
    .item { margin-bottom: 10px; padding-left: 10px; border-left: 2px solid #eee; }
    .item-title { font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error { color: #c00; padding: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [briefs, setBriefs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/data/briefs.json')
          .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
          .then(data => setBriefs(Array.isArray(data) ? data : []))
          .catch(err => setError(err))
          .finally(() => setLoading(false));
      }, []);

      if (loading) return <div className="container"><div className="loading">Loading...</div></div>;
      if (error) return <div className="container"><div className="error">Failed to load data ({error})</div></div>;

      return (
        <div className="container">
          <h1>Financial Insights Daily Brief</h1>
          <div className="last-updated">Latest: {briefs[0]?.date || 'N/A'}</div>
          {briefs.map(b => (
            <div key={b.date} className="brief">
              <div className="date">{b.date}</div>
              {b.overview && <div className="summary">{b.overview}</div>}
              {b.headlines && b.headlines.length > 0 && (
                <>
                  <div className="section-title">Today's Top News</div>
                  {b.headlines.map((h, i) => (
                    <div key={i} className="item">
                      <div className="item-title">{h.title}</div>
                      <div>{h.why}</div>
                      <div>✅ {h.bullish}</div>
                      <div>⚠️ {h.bearish}</div>
                    </div>
                  ))}
                </>
              )}
              {b.sectors && Object.keys(b.sectors).length > 0 && (
                <>
                  <div className="section-title">Sector Radar</div>
                  {Object.entries(b.sectors).map(([k, v]) => (
                    <div key={k} className="item"><strong>{k}</strong>: {v}</div>
                  ))}
                </>
              )}
              {b.preMarket && (
                <>
                  <div className="section-title">Pre-market Watch</div>
                  <div className="item">{b.preMarket}</div>
                </>
              )}
              {b.verdict && (
                <>
                  <div className="section-title">My Take</div>
                  <div className="item">{b.verdict}</div>
                </>
              )}
            </div>
          ))}
          <div style={{textAlign: 'center', marginTop: 24, color: '#999'}}>
            Built automatically • Data updates daily around 7am PT
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
